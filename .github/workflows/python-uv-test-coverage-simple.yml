name: Pytest with Coverage
# This is a basic pytest implementation without a postgres service and without parallelization

on:
  workflow_call:
    inputs:
      # Provided by caller workflow
      uv_version:
        type: string
        required: true
      # Optional
      working_directory:
        type: string
        description: Whenever the app (i.e. manage.py) is not in the root, the location can be specified here
        default: .
    secrets:
      private_pypi_user:
        required: true
      private_pypi_password:
        required: true

jobs:
  pytest-with-coverage:
    name: Pytest With Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: UV and Python Setup
        uses: repowerednl/.github/composite-actions/python-uv-cache@main
        with:
          uv_version: ${{ inputs.uv_version }}
          private_pypi_user: ${{ secrets.private_pypi_user }}
          private_pypi_password: ${{ secrets.private_pypi_password }}

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests with coverage
        working-directory: ${{ inputs.working_directory }}
        run: |
          uv run coverage run -m pytest -v
        env:
          pytest_github_report: true
          pytest_use_blanks: true
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          path: ${{ inputs.working_directory }}/.coverage
          if-no-files-found: 'error'
          include-hidden-files: true
          overwrite: true

      - name: Coverage reports
        working-directory: ${{ inputs.working_directory }}
        run: |
          uv run coverage report

      - name: Coverage comment
        id: coverage-comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          COVERAGE_PATH: ${{ inputs.working_directory }}
          MINIMUM_ORANGE: 80

      # Coverage gate (replaces SonarCloud's "Coverage on New Code"): fails the run if the
      # PR/diff coverage shown in the comment above is below 80%. Runs after the comment so it
      # is always posted; only on PRs, and skipped when the PR changes no coverable lines.
      - name: Enforce PR coverage threshold
        if: >-
          github.event_name == 'pull_request' &&
          steps.coverage-comment.outputs.diff_total_num_lines > 0 &&
          steps.coverage-comment.outputs.diff_total_percent_covered < 0.8
        run: |
          pct=$(awk "BEGIN { printf \"%.1f\", ${{ steps.coverage-comment.outputs.diff_total_percent_covered }} * 100 }")
          echo "::error::PR coverage ${pct}% (new/changed lines) is below the required 80%."
          exit 1