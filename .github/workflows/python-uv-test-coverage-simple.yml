name: Pytest with Coverage
# This is a basic pytest implementation without a postgres service and without parallelization

on:
  workflow_call:
    inputs:
      # Provided by caller workflow
      uv_version:
        type: string
        required: true
      # Optional
      working_directory:
        type: string
        description: Whenever the app (i.e. manage.py) is not in the root, the location can be specified here
        default: .
      coverage_threshold:
        type: string
        description: Minimum required coverage (%) on a PR's new/changed lines. Set via a repo variable to override.
        default: "80"
      run_sonar:
        type: boolean
        description: Run the parallel SonarCloud analysis job. Requires SONAR_TOKEN and a SonarCloud project for the repo.
        default: false
    secrets:
      private_pypi_user:
        required: true
      private_pypi_password:
        required: true
      # Needed by the parallel sonar-quality-control job. Optional so callers that
      # have not migrated keep running their tests (only the Sonar job fails).
      SONAR_TOKEN:
        required: false

jobs:
  pytest-with-coverage:
    name: Pytest With Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: UV and Python Setup
        uses: repowerednl/.github/composite-actions/python-uv-cache@main
        with:
          uv_version: ${{ inputs.uv_version }}
          private_pypi_user: ${{ secrets.private_pypi_user }}
          private_pypi_password: ${{ secrets.private_pypi_password }}

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Run tests with coverage
        working-directory: ${{ inputs.working_directory }}
        run: |
          uv run coverage run -m pytest -v
        env:
          pytest_github_report: true
          pytest_use_blanks: true
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          path: ${{ inputs.working_directory }}/.coverage
          if-no-files-found: 'error'
          include-hidden-files: true
          overwrite: true

      - name: Coverage reports
        working-directory: ${{ inputs.working_directory }}
        run: |
          uv run coverage report
          uv run coverage xml

      - name: Coverage comment and PR diff-coverage gate
        uses: repowerednl/.github/composite-actions/coverage-comment-and-gate@main
        with:
          github_token: ${{ github.token }}
          coverage_path: ${{ inputs.working_directory }}
          coverage_threshold: ${{ inputs.coverage_threshold }}

      # [Deprecated] Coverage is no longer fed to SonarCloud (the diff-coverage gate
      # above replaces it). Kept for backward compatibility with callers that still
      # download this artifact for a chained Sonar job; safe to drop once migrated.
      - name: Upload coverage XML
        uses: actions/upload-artifact@v7
        with:
          name: coverage.xml
          path: ${{ inputs.working_directory }}/coverage.xml
          if-no-files-found: 'error'
          overwrite: true

  sonar-quality-control:
    name: Run SonarCloud Quality Control
    if: ${{ inputs.run_sonar }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}