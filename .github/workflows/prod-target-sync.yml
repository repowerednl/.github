name: Run Daphne Sync

on:
  workflow_call:
    inputs:
      interval_unit:
        description: "Time interval unit for data sync (day, week, month; default is day)"
        required: true
        type: string
      interval_amount:
        description: "How much time interval to sync (default is 5)"
        required: true
        type: number
      exclude_tables:
        description: "| separated list of table(s/patterns) to exclude (% equals .* in regex). Can be 'none' to exclude nothing; inclusion > exclusion."
        required: true
        type: string
      include_tables:
        description: "| separated list of table(s/patterns) to include (% equals .* in regex). Can be '%' to include everything"
        required: true
        type: string
      # Optional
      runner:
        type: string
        default: 'ubuntu-latest'
        required: false
      uv_version:
        type: string
        default: "0.9.8"
        required: false
      log_level:
        description: "Logging level (default is INFO)"
        required: false
        default: INFO
        type: string
      datetime_until:
        description: "Datetime upper bound for data extraction (default is 'now', but can be a datetime string in the format: %Y-%m-%d %H:%M:%S)"
        required: false
        type: string
      environment:
        description: "The GitHub environment to run the sync in"
        required: false
        type: string
      continue_on_error:
        description: "Whether to continue on errors (default is true)"
        required: false
        default: 'true'
        type: string
    secrets:
      source_db:
        required: true
      source_host:
        required: true
      source_pw:
        required: true
      source_user:
        required: true
      source_port:
        required: true
      target_db:
        required: true
      target_host:
        required: true
      target_pw:
        required: true
      target_user:
        required: true
      target_port:
        required: true
      private_pypi_user:
        required: true
      private_pypi_password:
        required: true
      private_pypi_url:
        required: true

jobs:
  run-daphne:
    runs-on: ${{ inputs.runner }}
    environment: ${{ inputs.environment || '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install PostgreSQL 17 Client
        run: |
          sudo apt-get update
          sudo apt-get install -y wget ca-certificates
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo tee /etc/apt/keyrings/pgdg.asc > /dev/null
          sudo sh -c 'echo "deb [signed-by=/etc/apt/keyrings/pgdg.asc] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17
          echo "PostgreSQL 17 client installed"
          echo "pg_dump version: $(pg_dump --version)"

      - name: (Cached) Python and uv
        uses: repowerednl/.github/composite-actions/python-uv-cache@main
        with:
          uv_version: ${{ inputs.uv_version }}
          private_pypi_user: ${{ secrets.private_pypi_user }}
          private_pypi_password: ${{ secrets.private_pypi_password }}

      - name: Run Daphne sync
        uses: actions/github-script@v9
        env:
          SOURCE_DB: ${{ secrets.source_db }}
          SOURCE_HOST: ${{ secrets.source_host }}
          SOURCE_PW: ${{ secrets.source_pw }}
          SOURCE_USER: ${{ secrets.source_user }}
          SOURCE_PORT: ${{ secrets.source_port }}
          TARGET_DB: ${{ secrets.target_db }}
          TARGET_HOST: ${{ secrets.target_host }}
          TARGET_PW: ${{ secrets.target_pw }}
          TARGET_USER: ${{ secrets.target_user }}
          TARGET_PORT: ${{ secrets.target_port }}
          DATETIME_UNTIL: ${{ inputs.datetime_until }}
          INTERVAL_UNIT: ${{ inputs.interval_unit }}
          INTERVAL_AMOUNT: ${{ inputs.interval_amount }}
          EXCLUDE_TABLES: ${{ inputs.exclude_tables }}
          INCLUDE_TABLES: ${{ inputs.include_tables }}
          LOG_LEVEL: ${{ inputs.log_level }}
          CONTINUE_ON_ERROR: ${{ inputs.continue_on_error }}
        with:
          script: |
            const e = process.env;
            const datetimeUntil = e.DATETIME_UNTIL || new Date().toISOString().replace('T', ' ').substring(0, 19);
            const args = [
              'run', 'python', '-m', 'daphne.main',
              '--source-db-name', e.SOURCE_DB,
              '--source-host', e.SOURCE_HOST,
              '--source-password', e.SOURCE_PW,
              '--source-user', e.SOURCE_USER,
              '--source-port', e.SOURCE_PORT,
              '--target-db-name', e.TARGET_DB,
              '--target-host', e.TARGET_HOST,
              '--target-password', e.TARGET_PW,
              '--target-user', e.TARGET_USER,
              '--target-port', e.TARGET_PORT,
              '--interval-unit', e.INTERVAL_UNIT,
              '--interval-amount', e.INTERVAL_AMOUNT,
              '--exclude-tables', e.EXCLUDE_TABLES,
              '--include-tables', e.INCLUDE_TABLES,
              '--datetime_until', datetimeUntil,
              '--log-level', e.LOG_LEVEL,
            ];
            if (e.CONTINUE_ON_ERROR !== 'false') args.push('--continue-on-error');
            await exec.exec('uv', args);

      - name: Fix table ownership and apply fake initial migrations
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          PGPASSWORD: ${{ secrets.target_pw }}
          SQL_DATABASE: ${{ secrets.target_db }}
          SQL_USER: ${{ secrets.target_user }}
          SQL_PASSWORD: ${{ secrets.target_pw }}
          SQL_HOST: ${{ secrets.target_host }}
          SQL_PORT: ${{ secrets.target_port }}
        with:
          script: |
            const { SQL_HOST, SQL_USER, SQL_DATABASE } = process.env;
            const psqlBase = ['-h', SQL_HOST, '-U', SQL_USER, '-d', SQL_DATABASE];

            const psql = async (label, command) => {
              const rc = await exec.exec('psql', [...psqlBase, '-c', command], { ignoreReturnCode: true });
              if (rc !== 0) core.warning(`${label} failed`);
            };

            // Needed for older django versions — name column removed in 1.8 but still referenced in old migrations

            await psql('Adding name column', "ALTER TABLE django_content_type ADD COLUMN IF NOT EXISTS name VARCHAR(100) NOT NULL DEFAULT '';");
            const migrateRc = await exec.exec('uv', ['run', 'python', 'manage.py', 'migrate', '--fake-initial'], { ignoreReturnCode: true });

            if (migrateRc !== 0) core.warning('migrate --fake-initial failed');
            await psql('Dropping name column', 'ALTER TABLE django_content_type DROP COLUMN IF EXISTS name;');

            await psql('REASSIGN OWNED BY', `REASSIGN OWNED BY "${SQL_USER}" TO "backend-service";`);
