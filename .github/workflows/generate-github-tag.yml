name: Generate and Publish GitHub Tag

on:
  workflow_call:
    outputs:
      tag:
        description: "The Semantic Versioning GitHub tag used for version control"
        value: ${{ jobs.generate-tag.outputs.tag }}

jobs:
  generate-tag:
    permissions:
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.github-tag.outputs.tag }}
    if: ${{ github.event_name == 'push' 
      || (contains(github.event.workflow_run.conclusion, 'success') && (contains(github.event.workflow_run.head_branch, 'dev') 
      || contains(github.event.workflow_run.head_commit.message, '[deploy]'))) 
      || github.event.label.name == 'deploy' || github.event_name == 'workflow_dispatch' }}
    steps:
      # Checkout the repository with all commit history
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set prerelease flag
        id: set-prerelease-flag
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.payload.workflow_run?.head_branch
              ?? process.env.GITHUB_HEAD_REF
              ?? process.env.GITHUB_REF.split('/').pop();
            const commitMsg = context.payload.workflow_run?.head_commit?.message ?? '';
            const label = context.payload.label?.name ?? '';
            const prHead = context.payload.pull_request?.head?.ref ?? '';
            const prBase = context.payload.pull_request?.base?.ref ?? '';

            let isPrerelease = false;
            let reason = '';

            if (branch !== 'dev' && branch !== 'main') {
              isPrerelease = true;
              reason = `Branch is \`${branch}\`, not dev or main.`;
            } else if (commitMsg.includes('[deploy]')) {
              isPrerelease = true;
              reason = 'Commit message contains `[deploy]`.';
            } else if (label === 'deploy') {
              isPrerelease = true;
              reason = 'Label is `deploy`.';
            } else if (context.eventName === 'pull_request' && prBase === 'main' &&
                       (prHead === 'dev' || prHead.startsWith('hotfix/'))) {
              isPrerelease = true;
              reason = `PR from \`${prHead}\` to \`main\`.`;
            } else {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                base: 'main',
                head: `${context.repo.owner}:${branch}`,
              });
              if (prs.length > 0) {
                isPrerelease = true;
                reason = `Open PR from \`${branch}\` to \`main\`.`;
              }
            }

            core.setOutput('is_prerelease', isPrerelease);

            if (isPrerelease) {
              await core.summary.addHeading('🚀 Creating a **prerelease** tag', 3)
                .addRaw(`**Reason:** ${reason}`)
                .write();
            } else {
              await core.summary.addHeading('🎉 Creating a **full release** tag', 3).write();
            }

      # Automatically create and push tag with the latest SemVer formatted version.
      - name: Generate and push GitHub tag
        id: github-tag
        uses: anothrNick/github-tag-action@1.71.0 # (7/5/25) Pinned version needed: https://github.com/anothrNick/github-tag-action/issues/341
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          RELEASE_BRANCHES: main
          DEFAULT_BUMP: patch
          PRERELEASE: ${{ steps.set-prerelease-flag.outputs.is_prerelease == 'true' }}
