#TODO(REP-2945): Move migration Job to infra
name: Run Kubernetes migration Job

on:
  workflow_call:
    inputs:
      # Required
      tag:
        type: string
        required: true
      environment:
        type: string
        required: true
      migration_files:
        type: string
        #all migration directories
        default: |
         **/migrations/**/*.py
      base_sha:
        type: string
        description: The base sha to compare the changed files to. This is automatically set by the caller workflow 
        required: true
      
      head_sha:
        type: string
        description: The head sha to compare the changed files to. This is automatically set by the caller workflow a
        required: true
    secrets:
      digital_ocean_access_token:
        required: true
      infisical_client_id:
        required: false
      infisical_client_client_secret:
        required: false
      infisical_client_project_id:
        required: false

jobs:
  detect-model-changes:
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.changed-migration-files.outputs.any_changed }} 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 
      - name: Resolve base SHA for hotfix branches
        id: resolve_base
        if: startsWith(github.ref_name, 'hotfix') && inputs.base_sha == '0000000000000000000000000000000000000000'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: | #check if the branch is a hotfix branch, use compareCommits to find the merge-base,  the commit where this branch diverged from main 
            const { data } = await github.rest.repos.compareCommits({ 
              ...context.repo,
              base: 'main',
              head: '${{ inputs.head_sha }}',
            });
            return data.merge_base_commit.sha;
      - name: Detect migration-related changes
        if: github.event_name != 'workflow_dispatch'
        id: changed-migration-files
        uses: tj-actions/changed-files@v47.0.2
        with:
          files: ${{ inputs.migration_files }}
          base_sha: ${{ inputs.base_sha }}
          sha: ${{ inputs.head_sha }}

      - name: Skip migrations if no migration-related changes
        if: github.event_name != 'workflow_dispatch' && steps.changed-migration-files.outputs.any_changed != 'true'
        run: echo "No migration-related file changes detected. Skipping migration job."

  migraties:
    needs: detect-model-changes
    if: needs.detect-model-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get -y install gettext-base

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.digital_ocean_access_token }}

      - name: Save DigitalOcean kubeconfig with short-lived credentials
        env:
          expiry-seconds: ${{ vars.KUBE_CRED_EXPIRY_SECOND || 300 }}
        run: doctl kubernetes cluster kubeconfig save --expiry-seconds ${{ env.expiry-seconds }} ${{ vars.CLUSTER_NAME }}

      - name: Update kubernetes secrets
        run: |
          kubectl delete secret infisical-secrets --ignore-not-found=true
          if ! kubectl get secret infisical-secrets > /dev/null 2>&1; then
            echo "Secret not found. Creating it now..."
            kubectl create secret generic infisical-secrets \
              --from-literal=INFISICAL_CLIENT_ID=${{ secrets.infisical_client_id }} \
              --from-literal=INFISICAL_CLIENT_SECRET=${{ secrets.infisical_client_client_secret }} \
              --from-literal=INFISICAL_PROJECT_ID=${{ secrets.infisical_client_project_id }}
            echo "Secret created successfully."
          else
            echo "Secret already exists. It was created in another job"
          fi

      - name: Run migrations job if changes detected
        run: cat migrations_job.yml | envsubst | kubectl apply -f -
        env:
          VERSION: ${{ inputs.tag }}

      - name: Verify migrations are successful
        env:
          timeout-seconds: ${{ vars.MIGRATION_TIMEOUT_SECONDS || 300 }}
        run: kubectl wait --for=condition=complete --timeout=${{ env.timeout-seconds }}s job/django-migrations-${{inputs.tag}}

