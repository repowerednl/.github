name: Deploy

on:
  workflow_call:
    inputs:
      docker_image_tag:
        type: string
        required: true
      environment:
        type: string
        required: true
      selector:
        type: string
        required: true
        description: "Release name to deploy, e.g. 'api'. Must match a release name in helmfile.yaml.gotmpl."
      release_prefix:
        type: string
        required: false
        default: ''
        description: "Optional prefix prepended to release names in helmfile (e.g. 'test-' for canary deploys)."
    secrets:
      digital_ocean_access_token:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      packages: read
      contents: read
    steps:
      - name: Checkout ${{ github.repository }}
        uses: actions/checkout@v6

      - name: Digital Ocean + Helm setup (Kubernetes)
        uses: repowerednl/.github/composite-actions/kube-helmfile-setup@main
        with:
          digitalocean_token: ${{ secrets.digital_ocean_access_token }}
          cluster_name: ${{ vars.CLUSTER_NAME }}
          helm_version: ${{ vars.HELM_STABLE_VERSION }}
          kube_cred_expiry_seconds: ${{ vars.KUBE_CRED_EXPIRY_SECOND || 300 }}

      - name: Deploy
        uses: helmfile/helmfile-action@v2.4.3
        env:
          DOCKER_IMAGE_TAG: ${{ inputs.docker_image_tag }}
          ENVIRONMENT: ${{ inputs.environment }}
          RELEASE_PREFIX: ${{ inputs.release_prefix }}
          SELECTOR: ${{ inputs.selector }}
        with:
          helmfile-version: ${{ vars.HELMFILE_STABLE_VERSION }}
          helm-version: ${{ vars.HELM_STABLE_VERSION }}
          helmfile-args: >-
            -f deployment/helmfile.yaml.gotmpl sync
            --concurrency 0
            --selector name=${{ env.SELECTOR }}