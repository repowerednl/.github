name: uv Setup including Cache with configurable files
description: This composite action loads the cache that can be configured for multiple files, installs uv with configurations and its packages if not found on the cache.

inputs:
  uv_version:
    required: false
    default: 0.7.20
  private_pypi_user:
    required: true
  private_pypi_password:
    required: true
  enable_cache:
    required: false
    description: "[DEPRECATED] only used for backward compatibility (always enabled)"
    default: true
  working_directory:
    required: false
    description: "[DEPRECATED] only used for backward compatibility (always root)"
    default: .

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        version: ${{ inputs.uv_version }}
        enable-cache: true
        cache-python: true
        prune-cache: false
        cache-local-path: ${{ github.workspace }}/.uv-cache
        cache-dependency-glob: |
          uv.lock
          pyproject.toml

    - name: Set up Python
      shell: bash
      run: uv python install # This will respect the Python version pinned in the project

    - name: Install the project
      shell: bash
      env:
        UV_INDEX_REPOWERED_USERNAME: ${{ inputs.private_pypi_user }}
        UV_INDEX_REPOWERED_PASSWORD: ${{ inputs.private_pypi_password }}
      run: uv sync --locked --all-extras --dev