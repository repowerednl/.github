name: Classify, run Yarn commands (install, check-updates, lint, prettier, test with coverage and/or build with publish) and run Sonar

on:
  push:
    branches:
      - dev
      - hotfix**
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches-ignore:
      - main

# Cancel a superseded run so a stale (e.g. skipped-on-merge-sync) result never
# remains the authoritative status for the PR.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  draft-pr-check:
        uses: repowerednl/.github/.github/workflows/check-draft.yml@main
        with:
          is-draft: ${{ github.event_name == 'pull_request' && github.event.pull_request.draft }}

  # Early classification: detects a GitHub "Update branch" merge sync so the yarn
  # checks and sonar can be skipped for it.
  classify:
    uses: repowerednl/.github/.github/workflows/classify-pr-event.yml@main

  yarn-check-lint-prettier-test-publish:
    needs: [draft-pr-check, classify]
    # Skip the yarn checks on a merge sync (the code was already validated before the sync).
    if: needs.classify.outputs.is-merge-sync != 'true'
    permissions:
      contents: write
      packages: read
    uses: repowerednl/.github/.github/workflows/yarn-check-lint-prettier-test-publish.yml@main
    with:
      should_publish: false # Replace with ${{ endsWith( GITHUB.REF, 'main') }} to enable publishing
      should_test: true
      run_sonar: true # Opt in to the parallel SonarCloud job (needs SONAR_TOKEN + a SonarCloud project)
      # prettier_check_content: # Optional, defaults to "{json-server,src}/**/*.{js,vue,json,html,css,md}"
      # node_version: # Optional, defaults to "20"
      # working_directory: # Optional, defaults to '.'
    secrets:
      packages_auth_token: ${{ secrets.GITHUB_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}


